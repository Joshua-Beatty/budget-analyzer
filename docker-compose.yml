services:
  budget-analyzer:
    # Build straight from the main branch on GitHub. To build from a local
    # checkout instead, replace `build` with `build: .`.
    build:
      context: https://github.com/Joshua-Beatty/budget-analyzer.git#main
    image: budget-analyzer
    container_name: budget-analyzer
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Path to the SQLite database file inside the container. It lives under
      # /data, which is the mounted volume below, so the database persists.
      DB_FILE_NAME: /data/prod.db
    volumes:
      # Persist the SQLite database on the host at ./data.
      - ./data:/data
    # The container runs as root by default so the bind-mounted ./data is always
    # writable. To run unprivileged instead, uncomment and set to a user that
    # owns ./data on the host (e.g. `id -u`:`id -g`), then `mkdir -p ./data`:
    # user: "1000:1000"
